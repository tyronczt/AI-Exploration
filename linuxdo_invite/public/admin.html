<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 登录面板 -->
  <div class="login-panel" id="loginPanel">
    <div class="card login-card">
      <h1>管理员登录</h1>
      <p class="subtitle">请输入管理员密码</p>
      <form id="loginForm">
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="请输入管理员密码" required>
        </div>
        <p class="error-msg" id="loginError" style="display: none;"></p>
        <button type="submit" class="btn-submit" id="loginBtn">登录</button>
      </form>
      <a href="/" class="back-link">返回申请页面</a>
    </div>
  </div>

  <!-- 管理后台内容 -->
  <div class="admin-container" id="adminContent" style="display: none;">
    <header class="admin-header">
      <h1>邀请码管理系统</h1>
      <div class="header-actions">
        <a href="/" class="btn-link">返回申请页面</a>
        <button class="btn-logout" onclick="logout()">退出登录</button>
      </div>
    </header>

    <div class="main-panel">
      <div class="panel-header">
        <h2>申请记录列表</h2>
        <span class="total-count" id="totalCount">共 0 条记录</span>
      </div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>微信名</th>
              <th>申请时间</th>
              <th>状态</th>
              <th>邀请码</th>
              <th>预计日期</th>
              <th>邀请日期</th>
              <th>备注</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="applicationsTableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="applicationsPagination"></div>
    </div>
  </div>

  <!-- 编辑申请记录弹窗 -->
  <div class="modal" id="editAppModal">
    <div class="modal-content modal-edit">
      <h2>编辑申请记录</h2>
      <form id="editAppForm">
        <input type="hidden" id="editAppId">
        <div class="form-group">
          <label>状态</label>
          <select id="editAppStatus">
            <option value="not_qualified">不符合条件</option>
            <option value="in_queue">申请队列中</option>
            <option value="sent">已发送</option>
          </select>
        </div>
        <div class="form-group">
          <label>邀请日期</label>
          <input type="date" id="editAppInviteDate">
        </div>
        <div class="form-group">
          <label>邀请码</label>
          <input type="text" id="editAppInviteCode" placeholder="请输入邀请码">
        </div>
        <div class="form-group">
          <label>预计邀请日期</label>
          <input type="date" id="editAppExpectedDate">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="editAppRemark" rows="3" placeholder="可选填写备注"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeEditAppModal()">取消</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 提示弹窗 -->
  <div class="modal" id="toastModal">
    <div class="modal-content toast">
      <p id="toastMessage"></p>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
