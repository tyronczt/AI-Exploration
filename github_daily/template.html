<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 一周热点 - {{DATE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;background:#f6f8fa;color:#1a1a2e;line-height:1.7}

/* Header */
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1f2937 100%);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(88,166,255,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(163,113,247,.12) 0%,transparent 50%);pointer-events:none}
.header-content{position:relative;z-index:1;max-width:800px;margin:0 auto}
.header h1{font-size:2.2rem;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:-.5px}
.header h1 span{color:#58a6ff}
.header .subtitle{font-size:1rem;color:#8b949e;font-weight:400;margin-bottom:4px}
.header .badge{display:inline-block;margin-top:16px;padding:6px 16px;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);border-radius:20px;color:#58a6ff;font-size:.85rem;font-weight:500}

/* Container */
.container{max-width:800px;margin:0 auto;padding:32px 20px 48px}

/* Overview */
.overview{background:#fff;border:1px solid #e1e4e8;border-radius:12px;padding:24px 28px;margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.overview h2{font-size:1.05rem;font-weight:600;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.overview p{font-size:.92rem;color:#374151;line-height:1.8}
.overview .project-list{list-style:none;padding:0;margin-top:12px}
.overview .project-list li{font-size:.9rem;color:#374151;padding:4px 0;line-height:1.6}
.overview .project-list li strong{color:#0969da;font-weight:600}
.overview .project-list li .num{display:inline-block;width:22px;height:22px;background:#f0f2f5;border-radius:50%;text-align:center;line-height:22px;font-size:.75rem;font-weight:700;color:#57606a;margin-right:8px;flex-shrink:0}

/* Project Section */
.project-section{background:#fff;border:1px solid #e1e4e8;border-radius:12px;padding:28px 28px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .2s}
.project-section:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}

/* Project Header */
.project-header{margin-bottom:16px}
.project-heading{font-size:1.2rem;font-weight:700;color:#1a1a2e;margin-bottom:6px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.project-heading .num{font-size:.85rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#f97316);width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.project-heading .num.normal{background:#e1e4e8;color:#57606a}
.project-heading a{color:#0969da;text-decoration:none;word-break:break-all}
.project-heading a:hover{text-decoration:underline}
.project-heading .tagline{font-size:.9rem;font-weight:500;color:#57606a}
.project-link-row{margin-top:4px}
.project-link-row a{font-size:.82rem;color:#57606a;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .15s}
.project-link-row a:hover{color:#0969da}
.project-link-row a svg{opacity:.5}

/* One Liner */
.one-liner{font-size:.9rem;color:#0969da;background:#f0f6ff;border-left:3px solid #58a6ff;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;line-height:1.6;font-weight:500}

/* Project Body */
.project-body{font-size:.92rem;color:#374151;line-height:1.85}
.project-body p{margin-bottom:12px}
.project-body p:last-child{margin-bottom:0}
.project-body strong{color:#1a1a2e;font-weight:600}

/* Stats Row */
.stats-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid #f0f2f5}
.stat-tag{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;color:#57606a;background:#f6f8fa;padding:5px 12px;border-radius:8px}
.stat-tag svg{flex-shrink:0;opacity:.7}
.lang-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.weekly-tag{font-size:.82rem;font-weight:600;color:#cf222e;background:#ffebe9;padding:5px 12px;border-radius:8px;margin-left:auto}
.detail-toggle{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;background:#f0f2f5;border:1px solid #e1e4e8;border-radius:8px;color:#57606a;font-size:.82rem;cursor:pointer;transition:all .15s;font-family:inherit}
.detail-toggle:hover{background:#e8ecf0;color:#0969da;border-color:#0969da}

/* Inline Chart Area */
.chart-area{margin-top:16px;display:none}
.chart-area.open{display:block}
.chart-box{background:#f6f8fa;border-radius:10px;padding:16px 16px 8px;height:200px}

/* Modal (kept for future expansion) */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:sticky;top:12px;float:right;margin:12px 12px 0 0;width:32px;height:32px;border-radius:50%;border:none;background:#f0f2f5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#57606a;transition:all .15s;z-index:1}
.modal-close:hover{background:#e1e4e8;color:#1a1a2e}
.modal-body{padding:24px 28px 28px}

/* Footer */
.footer{text-align:center;padding:24px;color:#8b949e;font-size:.82rem;border-top:1px solid #e1e4e8;margin-top:16px}
.footer a{color:#58a6ff;text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:600px){
  .header h1{font-size:1.6rem}
  .container{padding:20px 12px}
  .project-section{padding:20px 18px 18px}
  .overview{padding:18px 20px}
  .weekly-tag{margin-left:0}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1><span>GitHub</span> 一周热点</h1>
    <div class="subtitle">每周精选最热门的开源项目</div>
    <div class="badge" id="header-badge">{{DATE}} &middot; 第 {{REPO_COUNT}} 个项目</div>
  </div>
</div>

<div class="container">
  <!-- Overview -->
  <div class="overview" id="overview"></div>

  <!-- Project Sections -->
  <div id="project-list"></div>

  <div class="footer">
    由 QoderWork 生成 &middot; 数据来源 <a href="https://github.com/trending?since=weekly" target="_blank">GitHub Trending</a> &middot; {{DATE}}
  </div>
</div>

<!-- ========== REPO DATA ========== -->
<script id="repos-data">
window.REPOS_DATA = {{REPOS_DATA_JSON}};
</script>

<!-- ========== Rendering ========== -->
<script>
(function(){
  const LANG_COLORS = {
    'JavaScript':'#f1e05a','TypeScript':'#3178c6','Python':'#3572A5','Java':'#b07219',
    'Go':'#00ADD8','Rust':'#dea584','C++':'#f34b7d','C':'#555555','C#':'#178600',
    'Ruby':'#701516','PHP':'#4F5D95','Swift':'#F05138','Kotlin':'#A97BFF','Dart':'#00B4AB',
    'Shell':'#89e051','Lua':'#000080','Vue':'#41b883','HTML':'#e34c26','CSS':'#563d7c',
    'Zig':'#ec915c','Elixir':'#6e4a7e','Haskell':'#5e5086','Scala':'#c22d40','Roff':'#555'
  };

  const repos = window.REPOS_DATA || [];
  const charts = {};

  function fmt(n){ return Number(n).toLocaleString('en-US'); }

  function getDateLabels(){
    const labels = [];
    const today = new Date();
    for(let i=6;i>=0;i--){
      const d = new Date(today);
      d.setDate(d.getDate()-i);
      labels.push(String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'));
    }
    return labels;
  }

  // Render overview
  function renderOverview(){
    const el = document.getElementById('overview');
    const items = repos.map((r,i) => {
      const tagline = r.zh_title || r.name.split('/')[1];
      return '<li><span class="num">'+(i+1)+'</span><strong>'+r.name+'</strong> — '+tagline+'</li>';
    }).join('');
    el.innerHTML = '<h2>本期内容</h2><ul class="project-list">'+items+'</ul>';
  }

  // Render project sections
  function renderProjects(){
    const el = document.getElementById('project-list');
    el.innerHTML = repos.map((repo, i) => {
      const rank = i + 1;
      const numClass = rank <= 3 ? '' : 'normal';
      const langColor = LANG_COLORS[repo.language] || '#8b949e';
      const langDisplay = repo.language || 'N/A';
      const tagline = repo.zh_title || '';
      const oneLiner = repo.zh_one_liner || '';
      const desc = repo.zh_full_description || repo.zh_summary || repo.description || 'N/A';

      return '<section class="project-section" id="project-'+i+'">'
        + '<div class="project-header">'
        +   '<div class="project-heading">'
        +     '<span class="num '+numClass+'">'+rank+'</span>'
        +     '<a href="'+repo.url+'" target="_blank" rel="noopener">'+repo.name+'</a>'
        +     (tagline ? '<span class="tagline">— '+tagline+'</span>' : '')
        +   '</div>'
        +   '<div class="project-link-row">'
        +     '<a href="'+repo.url+'" target="_blank" rel="noopener">'
        +       '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>'
        +       repo.url
        +     '</a>'
        +   '</div>'
        + '</div>'
        + (oneLiner ? '<div class="one-liner">'+oneLiner+'</div>' : '')
        + '<div class="project-body">'+formatBody(desc)+'</div>'
        + '<div class="stats-row">'
        +   '<span class="stat-tag"><span class="lang-dot" style="background:'+langColor+'"></span>'+langDisplay+'</span>'
        +   '<span class="stat-tag"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>'+fmt(repo.stars)+' stars</span>'
        +   '<span class="stat-tag"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 111.5 0v.878a2.25 2.25 0 01-2.25 2.25h-1.5v2.128a2.251 2.251 0 11-1.5 0V8.5h-1.5A2.25 2.25 0 013.5 6.25v-.878a2.25 2.25 0 111.5 0zM5 3.25a.75.75 0 10-1.5 0 .75.75 0 001.5 0zm6.75.75a.75.75 0 10 0-1.5.75.75 0 000 1.5zm-3 8.75a.75.75 0 10-1.5 0 .75.75 0 001.5 0z"/></svg>'+fmt(repo.forks)+' forks</span>'
        +   '<span class="weekly-tag">+'+fmt(repo.weekly_stars)+' 本周</span>'
        +   '<button class="detail-toggle" data-idx="'+i+'">星标趋势 &#9662;</button>'
        + '</div>'
        + '<div class="chart-area" id="chart-area-'+i+'"><div class="chart-box"><canvas id="chart-'+i+'"></canvas></div></div>'
        + '</section>';
    }).join('');
  }

  // Format body text: convert **bold** to <strong> and newlines to <p>
  function formatBody(text){
    if(!text) return '';
    // Split by double newlines or explicit \n\n into paragraphs
    const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
    return paragraphs.map(p => {
      // Handle **bold** markdown
      const html = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return '<p>' + html + '</p>';
    }).join('');
  }

  // Toggle chart
  function toggleChart(idx){
    const area = document.getElementById('chart-area-'+idx);
    const btn = document.querySelector('.detail-toggle[data-idx="'+idx+'"]');
    if(!area) return;

    if(area.classList.contains('open')){
      area.classList.remove('open');
      if(btn) btn.innerHTML = '星标趋势 &#9662;';
      if(charts[idx]){ charts[idx].destroy(); delete charts[idx]; }
    } else {
      area.classList.add('open');
      if(btn) btn.innerHTML = '收起 &#9652;';
      renderChart(idx);
    }
  }

  // Render chart
  function renderChart(idx){
    const repo = repos[idx];
    if(!repo || !repo.star_trend || !repo.star_trend.length) return;
    const canvas = document.getElementById('chart-'+idx);
    if(!canvas) return;

    const labels = getDateLabels();
    const data = repo.star_trend;

    if(typeof Chart === 'undefined'){
      // CSS fallback
      const maxVal = Math.max(...data);
      canvas.parentElement.innerHTML = '<div style="display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 4px">'
        + data.map(function(v,i){
            const h = maxVal > 0 ? Math.max(4,(v/maxVal)*100) : 4;
            return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
              + '<span style="font-size:11px;color:#57606a">'+v+'</span>'
              + '<div style="width:100%;height:'+h+'%;background:linear-gradient(to top,#f59e0b,#fbbf24);border-radius:4px 4px 0 0;min-height:4px"></div>'
              + '<span style="font-size:10px;color:#8b949e">'+labels[i]+'</span></div>';
          }).join('') + '</div>';
      return;
    }

    charts[idx] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: '每日新增星标',
          data: data,
          backgroundColor: 'rgba(245,158,11,.7)',
          borderColor: '#f59e0b',
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.65
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a2e',
            padding: 10,
            cornerRadius: 8,
            callbacks: { label: function(c){ return '新增 '+c.parsed.y.toLocaleString()+' 星标'; } }
          }
        },
        scales: {
          y: { beginAtZero:true, grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:11}, callback:function(v){return v>=1000?(v/1000).toFixed(1)+'k':v;}} },
          x: { grid:{display:false}, ticks:{font:{size:11}} }
        }
      }
    });
  }

  // Event delegation
  document.getElementById('project-list').addEventListener('click', function(e){
    const btn = e.target.closest('.detail-toggle');
    if(btn) toggleChart(parseInt(btn.dataset.idx, 10));
  });

  // Init
  renderOverview();
  renderProjects();
})();
</script>
</body>
</html>
