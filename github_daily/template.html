<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Trending 周报 | {{DATE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--bg:#0d1117;--surface:#161b22;--surface-hover:#1c2333;--border:#30363d;--text:#e6edf3;--text-secondary:#8b949e;--accent:#58a6ff;--accent-glow:rgba(88,166,255,.15);--green:#3fb950;--green-glow:rgba(63,185,80,.15);--orange:#d29922;--red:#f85149;--purple:#bc8cff;--yellow:#e3b341}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:40px 24px}

/* Header */
.header{text-align:center;margin-bottom:48px;position:relative}
.header::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(88,166,255,.08) 0%,transparent 70%);pointer-events:none}
.header .badge{display:inline-block;padding:6px 16px;background:var(--accent-glow);border:1px solid rgba(88,166,255,.3);border-radius:20px;font-size:13px;color:var(--accent);font-weight:500;margin-bottom:16px;letter-spacing:.5px}
.header h1{font-size:36px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#e6edf3 0%,#58a6ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.header .subtitle{color:var(--text-secondary);font-size:15px}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-card .stat-value{font-size:28px;font-weight:700;color:var(--accent);margin-bottom:4px}
.stat-card .stat-label{font-size:13px;color:var(--text-secondary)}

/* Categories */
.categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.cat-tag{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);transition:all .2s}
.cat-tag:hover{border-color:var(--accent);background:var(--accent-glow)}
.cat-tag .count{color:var(--text-secondary);margin-left:4px}

/* Analysis */
.analysis{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:48px}
.analysis h3{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.analysis p{color:var(--text-secondary);font-size:14px;line-height:1.8;margin-bottom:12px}
.analysis .highlight{color:var(--accent);font-weight:500}
.analysis .tag{display:inline-block;padding:2px 8px;background:var(--accent-glow);border-radius:4px;font-size:12px;color:var(--accent);margin:2px}
.lang-dist{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.lang-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:13px}
.lang-pill .pct{color:var(--text-secondary)}
.lang-dot{width:12px;height:12px;border-radius:50%;display:inline-block}

/* Section title */
.section-title{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-title .icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px}

/* Repo list */
.repo-list{display:flex;flex-direction:column;gap:12px;margin-bottom:48px}
.repo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all .2s ease;position:relative;overflow:hidden}
.repo-card:hover{border-color:var(--accent);background:var(--surface-hover);transform:translateY(-1px)}
.repo-card.top-3::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.repo-card.rank-1::before{background:linear-gradient(180deg,#ffd700,#ff8c00)}
.repo-card.rank-2::before{background:linear-gradient(180deg,#c0c0c0,#8a8a8a)}
.repo-card.rank-3::before{background:linear-gradient(180deg,#cd7f32,#8b4513)}

.repo-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
.repo-rank{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-weight:700;font-size:14px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);color:var(--text-secondary)}
.repo-card.rank-1 .repo-rank{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none}
.repo-card.rank-2 .repo-rank{background:linear-gradient(135deg,#c0c0c0,#8a8a8a);color:#000;border:none}
.repo-card.rank-3 .repo-rank{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;border:none}
.repo-info{flex:1;min-width:0}
.repo-name{font-size:16px;font-weight:600;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.repo-name:hover{text-decoration:underline}
.repo-name .owner{color:var(--text-secondary);font-weight:400}
.repo-desc{color:var(--text);font-size:14px;line-height:1.65;margin:8px 0}
.repo-desc-cn{color:var(--text-secondary);font-size:13px;line-height:1.6;margin-bottom:12px;padding-left:12px;border-left:2px solid var(--border)}
.repo-meta{display:flex;flex-wrap:wrap;align-items:center;gap:16px;font-size:13px;color:var(--text-secondary)}
.repo-meta .item{display:flex;align-items:center;gap:5px}
.stars-week{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--green-glow);border-radius:12px;color:var(--green);font-weight:600;font-size:13px}

/* Bar chart */
.bar-chart{width:120px;flex-shrink:0}
.bar-label{font-size:11px;color:var(--text-secondary);text-align:right;margin-bottom:4px}
.bar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#2ea043);transition:width .6s ease}

/* Detail toggle & chart */
.chart-toggle{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--accent-glow);border:1px solid rgba(88,166,255,.25);border-radius:12px;color:var(--accent);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.chart-toggle:hover{background:rgba(88,166,255,.25);border-color:var(--accent)}
.chart-area{margin-top:14px;display:none}
.chart-area.open{display:block}
.chart-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;height:200px}

/* Footer */
.footer{text-align:center;padding:24px;color:var(--text-secondary);font-size:13px;border-top:1px solid var(--border)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:768px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .header h1{font-size:28px}
  .repo-header{flex-direction:column}
  .bar-chart{width:100%}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">{{DATE}} &middot; {{REPO_COUNT}} 个项目</div>
    <h1>GitHub Trending 周报</h1>
    <div class="subtitle">{{DATE}} | 本周最火热的开源项目盘点</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Categories -->
  <div class="categories" id="categories"></div>

  <!-- Overview analysis -->
  <div class="analysis" id="analysis"></div>

  <!-- Repo list -->
  <div class="section-title">
    <span class="icon" style="background:var(--green-glow);">&#128293;</span>
    本周 Top <span id="repo-count-label"></span> 热门项目
  </div>
  <div class="repo-list" id="repo-list"></div>

  <div class="footer">
    <p>数据来源：<a href="https://github.com/trending?since=weekly" target="_blank">GitHub Trending</a> | 报告周期：{{DATE}}</p>
    <p style="margin-top:6px;">由 Hermes 自动生成</p>
  </div>
</div>

<!-- ========== REPO DATA ========== -->
<script id="repos-data">
window.REPOS_DATA = {{REPOS_DATA_JSON}};
</script>

<!-- ========== Rendering ========== -->
<script>
(function(){
  const LANG_COLORS = {
    'JavaScript':'#f1e05a','TypeScript':'#3178c6','Python':'#3572A5','Java':'#b07219',
    'Go':'#00ADD8','Rust':'#dea584','C++':'#f34b7d','C':'#555555','C#':'#178600',
    'Ruby':'#701516','PHP':'#4F5D95','Swift':'#F05138','Kotlin':'#A97BFF','Dart':'#00B4AB',
    'Shell':'#89e051','Lua':'#000080','Vue':'#41b883','HTML':'#e34c26','CSS':'#563d7c',
    'Zig':'#ec915c','Elixir':'#6e4a7e','Haskell':'#5e5086','Scala':'#c22d40'
  };

  const repos = (window.REPOS_DATA || []).sort(function(a,b){ return b.weekly_stars - a.weekly_stars; });
  const charts = {};
  const maxWeeklyStars = repos.length > 0 ? repos[0].weekly_stars : 1;

  function fmt(n){ return Number(n).toLocaleString('en-US'); }

  function getDateLabels(){
    var labels = [];
    var today = new Date();
    for(var i=6;i>=0;i--){
      var d = new Date(today);
      d.setDate(d.getDate()-i);
      labels.push(String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'));
    }
    return labels;
  }

  // Compute language distribution
  function computeLangDist(){
    var counts = {};
    repos.forEach(function(r){
      var lang = r.language || 'Other';
      counts[lang] = (counts[lang]||0) + 1;
    });
    var total = repos.length;
    return Object.keys(counts).map(function(k){
      return {lang:k, count:counts[k], pct:Math.round(counts[k]/total*100)};
    }).sort(function(a,b){ return b.count - a.count; });
  }

  // Render stats bar
  function renderStats(){
    var el = document.getElementById('stats-bar');
    var totalWeekly = repos.reduce(function(s,r){ return s + (r.weekly_stars||0); }, 0);
    var langDist = computeLangDist();
    var topLang = langDist.length > 0 ? langDist[0].lang : 'N/A';
    var weeklyStr = totalWeekly >= 1000 ? Math.round(totalWeekly/1000) + 'K+' : String(totalWeekly);

    el.innerHTML = [
      {v:repos.length, l:'上榜项目'},
      {v:weeklyStr, l:'本周新增 Star'},
      {v:topLang, l:'最热语言'},
      {v:'AI Agent', l:'主流趋势'}
    ].map(function(s){
      return '<div class="stat-card"><div class="stat-value">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>';
    }).join('');
  }

  // Render categories
  function renderCategories(){
    var el = document.getElementById('categories');
    var langDist = computeLangDist();
    el.innerHTML = langDist.slice(0,8).map(function(d){
      var color = LANG_COLORS[d.lang] || '#8b949e';
      return '<div class="cat-tag"><span class="lang-dot" style="background:'+color+';width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:4px"></span>'+d.lang+' <span class="count">'+d.count+'</span></div>';
    }).join('');
  }

  // Render analysis
  function renderAnalysis(){
    var el = document.getElementById('analysis');
    var langDist = computeLangDist();
    var langPills = langDist.slice(0,6).map(function(d){
      var color = LANG_COLORS[d.lang] || '#8b949e';
      return '<div class="lang-pill"><span class="lang-dot" style="background:'+color+'"></span> '+d.lang+' <span class="pct">'+d.pct+'%</span></div>';
    }).join('');

    var topProjects = repos.slice(0,3).map(function(r){
      return '<span class="tag">'+r.name.split('/')[1]+'</span>';
    }).join('、');

    el.innerHTML = '<h3>&#128202; 本周趋势洞察</h3>'
      + '<p>本周 GitHub Trending 共收录 <span class="highlight">'+repos.length+'</span> 个热门项目，'
      + '累计本周新增 Star 超过 <span class="highlight">'+fmt(repos.reduce(function(s,r){return s+r.weekly_stars;},0))+'</span>。'
      + '最热门的编程语言是 <span class="highlight">'+(langDist[0]?langDist[0].lang:'N/A')+'</span>（占比 '+(langDist[0]?langDist[0].pct:0)+'%）。'
      + '排名前三的项目分别是 '+topProjects+'。</p>'
      + '<div class="lang-dist">'+langPills+'</div>';
  }

  // Render repo cards
  function renderRepos(){
    var el = document.getElementById('repo-list');
    document.getElementById('repo-count-label').textContent = repos.length;

    el.innerHTML = repos.map(function(repo, i){
      var rank = i + 1;
      var rankClass = rank <= 3 ? ' top-3 rank-'+rank : '';
      var langColor = LANG_COLORS[repo.language] || '#8b949e';
      var langDisplay = repo.language || 'N/A';
      var barWidth = maxWeeklyStars > 0 ? Math.max(2, (repo.weekly_stars / maxWeeklyStars) * 100) : 2;
      var starEmoji = rank <= 4 ? '&#128640; ' : (rank <= 8 ? '&#128293; ' : '');

      var desc = repo.description || 'N/A';
      var zhDesc = repo.zh_full_description || repo.zh_one_liner || repo.zh_summary || '';
      var zhTitle = repo.zh_title || '';
      var oneLiner = repo.zh_one_liner || '';

      var descHtml = '<div class="repo-desc">'+escHtml(desc)+'</div>';
      if(zhDesc){
        descHtml += '<div class="repo-desc-cn">'+formatZhDesc(zhDesc)+'</div>';
      }

      return '<div class="repo-card'+rankClass+'">'
        + '<div class="repo-header">'
        +   '<div class="repo-rank">'+rank+'</div>'
        +   '<div class="repo-info">'
        +     '<a class="repo-name" href="'+repo.url+'" target="_blank">'
        +       '<span class="owner">'+repo.name.split('/')[0]+'/</span>'+repo.name.split('/')[1]
        +     '</a>'
        +     (oneLiner ? '<div class="repo-desc" style="color:var(--accent);font-weight:500;margin-top:4px">'+escHtml(oneLiner)+'</div>' : '')
        +     descHtml
        +   '</div>'
        +   '<div class="bar-chart">'
        +     '<div class="bar-label">+'+fmt(repo.weekly_stars)+' &#11088;</div>'
        +     '<div class="bar-track"><div class="bar-fill" style="width:'+barWidth.toFixed(1)+'%"></div></div>'
        +   '</div>'
        + '</div>'
        + '<div class="repo-meta">'
        +   '<span class="item"><span class="lang-dot" style="background:'+langColor+'"></span> '+langDisplay+'</span>'
        +   '<span class="item">&#11088; '+fmt(repo.stars)+'</span>'
        +   '<span class="item">&#127860; '+fmt(repo.forks)+'</span>'
        +   '<span class="stars-week">'+starEmoji+'本周 +'+fmt(repo.weekly_stars)+'</span>'
        +   (repo.star_trend && repo.star_trend.length ? '<button class="chart-toggle" data-idx="'+i+'">&#128200; 星标趋势 &#9662;</button>' : '')
        + '</div>'
        + (repo.star_trend && repo.star_trend.length ? '<div class="chart-area" id="chart-area-'+i+'"><div class="chart-box"><canvas id="chart-'+i+'"></canvas></div></div>' : '')
        + '</div>';
    }).join('');
  }

  function escHtml(s){
    if(!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatZhDesc(text){
    if(!text) return '';
    var paragraphs = text.split(/\n\n+/).filter(function(p){ return p.trim(); });
    return paragraphs.map(function(p){
      return p.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
    }).join('<br><br>');
  }

  // Toggle chart
  function toggleChart(idx){
    var area = document.getElementById('chart-area-'+idx);
    var btn = document.querySelector('.chart-toggle[data-idx="'+idx+'"]');
    if(!area) return;

    if(area.classList.contains('open')){
      area.classList.remove('open');
      if(btn) btn.innerHTML = '&#128200; 星标趋势 &#9662;';
      if(charts[idx]){ charts[idx].destroy(); delete charts[idx]; }
    } else {
      area.classList.add('open');
      if(btn) btn.innerHTML = '收起 &#9652;';
      renderChart(idx);
    }
  }

  // Render chart
  function renderChart(idx){
    var repo = repos[idx];
    if(!repo || !repo.star_trend || !repo.star_trend.length) return;
    var canvas = document.getElementById('chart-'+idx);
    if(!canvas) return;

    var labels = getDateLabels();
    var data = repo.star_trend;

    if(typeof Chart === 'undefined'){
      var maxVal = Math.max.apply(null, data);
      canvas.parentElement.innerHTML = '<div style="display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 4px">'
        + data.map(function(v,i){
            var h = maxVal > 0 ? Math.max(4,(v/maxVal)*100) : 4;
            return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
              + '<span style="font-size:11px;color:#8b949e">'+v+'</span>'
              + '<div style="width:100%;height:'+h+'%;background:linear-gradient(to top,#2ea043,#3fb950);border-radius:4px 4px 0 0;min-height:4px"></div>'
              + '<span style="font-size:10px;color:#8b949e">'+labels[i]+'</span></div>';
          }).join('') + '</div>';
      return;
    }

    charts[idx] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: '每日新增星标',
          data: data,
          backgroundColor: 'rgba(63,185,80,.6)',
          borderColor: '#3fb950',
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.65
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2333',
            titleColor: '#e6edf3',
            bodyColor: '#e6edf3',
            padding: 10,
            cornerRadius: 8,
            callbacks: { label: function(c){ return '新增 '+c.parsed.y.toLocaleString()+' 星标'; } }
          }
        },
        scales: {
          y: { beginAtZero:true, grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#8b949e',font:{size:11}, callback:function(v){return v>=1000?(v/1000).toFixed(1)+'k':v;}} },
          x: { grid:{display:false}, ticks:{color:'#8b949e',font:{size:11}} }
        }
      }
    });
  }

  // Event delegation
  document.getElementById('repo-list').addEventListener('click', function(e){
    var btn = e.target.closest('.chart-toggle');
    if(btn) toggleChart(parseInt(btn.dataset.idx, 10));
  });

  // Init
  renderStats();
  renderCategories();
  renderAnalysis();
  renderRepos();
})();
</script>
</body>
</html>
